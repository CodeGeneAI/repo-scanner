name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: 1
  HUSKY: 0

jobs:
  release:
    if: ${{ github.repository == 'CodeGeneAI/repo-scanner' }}
    name: Release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - name: Mint GitHub App token
        id: app-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          app-id: 2479570
          private-key: ${{ secrets.CODEGENEAI_APP_PRIVATE_KEY }}
          # Downscope: by default the minted token inherits ALL of the
          # CodeGeneAI App's installation permissions. release-please needs
          # only these three; everything else (actions:write,
          # administration:write, secrets:read, workflows:write, ...) is
          # dropped from the minted token by listing here explicitly.
          permission-contents: write # release commits + tags + GitHub Releases
          permission-pull-requests: write # release PR creation
          permission-issues: write # release-please labels its PRs

      - name: Run release-please
        id: release-please
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          token: ${{ steps.app-token.outputs.token }}
          config-file: .release-please-config.json
          manifest-file: .release-please-manifest.json

      # Enable auto-merge on the release PR so it lands as soon as CI passes
      # and any required reviews are satisfied. Idempotent — calling on an
      # already-auto-merging PR is a no-op.
      #
      # SECURITY: the release-please `pr` output is the full PullRequest JSON,
      # including release notes built from commit messages. NEVER interpolate
      # it directly into a shell script via ${{ ... }} — pass it through an
      # env var and feed it to jq on stdin so shell quoting is irrelevant.
      - name: Enable auto-merge on release PR
        if: ${{ steps.release-please.outputs.pr }}
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          RELEASE_PLEASE_PR: ${{ steps.release-please.outputs.pr }}
          GH_REPO: ${{ github.repository }}
        run: |
          pr_number=$(jq -r '.number' <<< "$RELEASE_PLEASE_PR")
          if [ -n "$pr_number" ] && [ "$pr_number" != "null" ]; then
            gh pr merge "$pr_number" --auto --squash --repo "$GH_REPO"
          fi

      # All subsequent steps only run when release-please has actually created
      # a GitHub Release (i.e. a version PR was merged and a tag was created).
      - uses: actions/checkout@v6
        if: ${{ steps.release-please.outputs.release_created }}

      - uses: actions/setup-node@v6
        if: ${{ steps.release-please.outputs.release_created }}
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - uses: oven-sh/setup-bun@v2
        if: ${{ steps.release-please.outputs.release_created }}
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        if: ${{ steps.release-please.outputs.release_created }}
        run: bun install --frozen-lockfile

      # actions/setup-node writes an .npmrc with NODE_AUTH_TOKEN and configures
      # npm to use OIDC for Trusted Publishing when id-token: write is set.
      # No NPM_TOKEN secret needed.
      - name: Publish to npm (Trusted Publishing OIDC)
        if: ${{ steps.release-please.outputs.release_created }}
        run: npm publish --provenance --access public
