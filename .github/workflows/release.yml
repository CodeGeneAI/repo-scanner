name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: 1
  HUSKY: 0

jobs:
  release:
    if: ${{ github.repository == 'CodeGeneAI/repo-scanner' }}
    name: Release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      # Mint the App token BEFORE checkout so the git remote is auth'd with
      # the App's credentials. Without this, commits made by changesets/action
      # are attributed to github-actions[bot] (the default checkout token's
      # identity), and GitHub's "GITHUB_TOKEN can't trigger downstream
      # workflows" rule prevents CI from firing on the version PR's branch.
      - name: Mint GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.CODEGENEAI_APP_CLIENT_ID }}
          private-key: ${{ secrets.CODEGENEAI_APP_PRIVATE_KEY }}
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      # Configure git user.name/user.email to the App's bot identity so any
      # commit changesets/action creates is attributed to the App, not to
      # github-actions[bot]. The bot user-id is needed for the noreply email
      # format that GitHub recognizes as the App's bot.
      - name: Configure git as the codegeneai App bot
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          USER_ID=$(gh api "/users/${{ steps.app-token.outputs.app-slug }}[bot]" --jq .id)
          git config --global user.name "${{ steps.app-token.outputs.app-slug }}[bot]"
          git config --global user.email "${USER_ID}+${{ steps.app-token.outputs.app-slug }}[bot]@users.noreply.github.com"
      - run: bun install --frozen-lockfile
      - name: Release with Changesets
        id: changesets
        uses: changesets/action@v1
        with:
          title: "[Release] Version packages"
          commit: "[Release] Version packages"
          publish: bun x changeset publish
          setupGitUser: false # we already configured git as the App bot
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}

      # When a publish actually happens, install the freshly-published
      # version from npm in a clean directory and run a smoke scan against
      # a known-shape external repo (p-map: small JS lib). This catches
      # publish-pipeline regressions — wrong files in the tarball, broken
      # tree-sitter resolution, etc. — before consumers do.
      - name: Post-publish smoke test
        if: steps.changesets.outputs.published == 'true'
        run: |
          set -euo pipefail
          PUBLISHED_VERSION=$(echo '${{ steps.changesets.outputs.publishedPackages }}' | jq -r '.[0].version')
          echo "Verifying published @codegeneai/repo-scanner@${PUBLISHED_VERSION}"
          mkdir -p /tmp/scanner-postpublish
          cd /tmp/scanner-postpublish
          # npm registry index propagation after a Trusted Publishing publish
          # can lag by 5-30s — `bun add` queries the index before it's been
          # updated. Retry with backoff up to ~90s before giving up.
          for attempt in 1 2 3 4 5 6 7 8 9; do
            if bun add -g "@codegeneai/repo-scanner@${PUBLISHED_VERSION}"; then
              echo "install succeeded on attempt ${attempt}"
              break
            fi
            if [ "${attempt}" = "9" ]; then
              echo "::error::install failed after 9 attempts (~90s of retries)"
              exit 1
            fi
            echo "registry index not ready yet, retrying in 10s (attempt ${attempt}/9)"
            sleep 10
          done
          repo-scanner --version
          git clone --depth 1 https://github.com/sindresorhus/p-map.git
          cd p-map
          repo-scanner --all-detectors --path . --format json > /tmp/post-publish-scan.json
          jq -e '.vcs.type == "git"' /tmp/post-publish-scan.json > /dev/null
          jq -e '.inventory.languages | contains(["JavaScript"])' /tmp/post-publish-scan.json > /dev/null
          jq -e '.inventory.namingConventions | length > 0' /tmp/post-publish-scan.json > /dev/null
          echo "Post-publish smoke passed ($(stat -c %s /tmp/post-publish-scan.json) bytes of scan output)"
